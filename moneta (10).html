function setWantTimeline(mode){
  _wantTimeline=mode;
  el('wt-date').classList.toggle('active',mode==='date');
  el('wt-months').classList.toggle('active',mode==='months');
  el('w-date-wrap').style.display=mode==='date'?'block':'none';
  el('w-months-wrap').style.display=mode==='months'?'block':'none';
  updateWantCalc();
}
function updateWantCalc(){
  try{
    const target=Number(el('m-wtarget').value)||0;
    const already=Number(el('m-wsaved').value)||0;
    const rem=Math.max(0,target-already);
    let months=6;
    if(_wantTimeline==='date'){
      const d=new Date(el('m-wdate').value);
      months=Math.max(1,Math.ceil((d-new Date())/(1000*60*60*24*30.44)));
    } else {
      months=Math.max(1,Number(el('m-wmonths').value)||6);
    }
    const monthly=rem>0?Math.ceil(rem/months):0;
    const sal=Number(S.profile.salary)||0;
    const spent=S.expenses.filter(e=>mKey(e.date)===thisMonth()).reduce((s,e)=>s+Number(e.amt),0);
    const invOut=thisMonthInvOutflow();
    const free=Math.max(0,sal-spent-invOut);
    const canAfford=monthly>0&&free>=monthly;
    const mc=el('wc-monthly'),mml=el('wc-months'),mca=el('wc-afford');
    if(mc)mc.textContent=target>0?fmt(monthly):'₹0';
    if(mml)mml.textContent=months+'mo';
    if(mca){mca.textContent=monthly===0?'No saving needed':canAfford?'Yes ✓':'Need cuts';mca.style.color=monthly===0?'var(--green)':canAfford?'var(--green)':'var(--red)';}
  }catch(e){}
}
function selWantPrio(el,v){document.querySelectorAll('#wprio-grid .pay-opt').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');document.getElementById('m-wprio').value=v;}
function selWantColor(sw,c){document.querySelectorAll('#wsw .sw').forEach(s=>s.classList.remove('sel'));sw.classList.add('sel');document.getElementById('m-wcol').value=c;}
function submitWant(){
  const name=(el('m-wname').value||'').trim(),target=Number(el('m-wtarget').value)||0;
  if(!name){alert('Please enter a name for this goal.');return;}
  if(!target){alert('Please enter a target amount.');return;}
  S.wants.push({
    id:uid(),name,emoji:el('m-wemoji').value||'🛍️',targetAmount:target,
    targetDate:_wantTimeline==='date'?el('m-wdate').value:null,
    monthsDuration:_wantTimeline==='months'?Number(el('m-wmonths').value)||6:null,
    priority:el('m-wprio').value||'medium',color:el('m-wcol').value||SWATCHES[0],
    notes:el('m-wnotes').value,status:'active',contributions:[],
  });
  save();closeModal();navigate('wants');
}

function openContribute(wantId){
  const w=S.wants.find(x=>x.id===wantId);if(!w)return;
  const saved=wantTotalSaved(w),rem=wantRemaining(w),monthly=wantMonthlyNeeded(w);
  openModal(`
  <div class="mhd"><h2>${w.emoji||'🛍️'} Contribute to Goal</h2><button class="btn-del" onclick="closeModal()">${ICONS.x}</button></div>
  <div style="background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px">${w.name}</div>
    <div style="height:7px;background:var(--surf2);border-radius:7px;overflow:hidden;margin-bottom:8px">
      <div style="height:100%;width:${wantProgress(w)}%;background:${w.color||'var(--accent)'}"></div>
    </div>
    <div style="display:flex;gap:16px;font-size:12px">
      <span class="c-m">Saved: <strong style="color:var(--green)">${fmt(saved)}</strong></span>
      <span class="c-m">Remaining: <strong style="color:var(--red)">${fmt(rem)}</strong></span>
      <span class="c-m">Goal: <strong>${fmt(w.targetAmount)}</strong></span>
    </div>
  </div>
  <div class="fcol">
    <div>
      <label class="lbl">Quick amounts</label>
      <div class="pay-quick">
        <div class="pay-opt sel" onclick="setCamt(this,${monthly})"><div class="pay-opt-lbl">Monthly target</div><div class="pay-opt-val">${fmt(monthly)}</div></div>
        <div class="pay-opt" onclick="setCamt(this,${Math.ceil(monthly/2)})"><div class="pay-opt-lbl">Half target</div><div class="pay-opt-val">${fmt(Math.ceil(monthly/2))}</div></div>
        <div class="pay-opt" onclick="setCamt(this,${rem})"><div class="pay-opt-lbl">Full goal</div><div class="pay-opt-val">${fmt(rem)}</div></div>
      </div>
    </div>
    <div><label class="lbl">Amount (₹)</label><input type="number" id="m-camt" value="${monthly}" min="1" oninput="document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'))"></div>
    <div><label class="lbl">Date</label><input type="date" id="m-cdate" value="${today()}"></div>
    <div><label class="lbl">Note (optional)</label><input id="m-cnote" placeholder="e.g. Saved from bonus, skipped dining out..."></div>
    <button class="btn-g" style="justify-content:center" onclick="submitContribution('${wantId}')">Add Contribution</button>
  </div>`);
}
function setCamt(el,amt){document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById('m-camt').value=amt;}
function submitContribution(wantId){
  const w=S.wants.find(x=>x.id===wantId);if(!w)return;
  const amt=Number(el('m-camt').value);
  if(!amt||amt<=0){alert('Enter a valid amount.');return;}
  w.contributions=w.contributions||[];
  w.contributions.push({id:uid(),date:el('m-cdate').value,amount:amt,note:el('m-cnote').value});
  if(wantTotalSaved(w)>=Number(w.targetAmount))w.status='achieved';
  save();closeModal();navigate('wants');
}
function achieveWant(id){
  if(!confirm('Mark this goal as achieved? 🎉'))return;
  const w=S.wants.find(x=>x.id===id);if(w)w.status='achieved';
  save();navigate('wants');
}
function deleteWant(id){
  if(!confirm('Delete this goal and all contributions?'))return;
  S.wants=S.wants.filter(w=>w.id!==id);save();navigate('wants');
}
// ═══════════════════════════════════════
// BACKUP & DATA
// ═══════════════════════════════════════
function exportData(){
  const payload={_monetaBackup:true,_version:'2.0',_exportDate:new Date().toISOString(),_appName:'Moneta Personal Finance',_recordCount:{expenses:S.expenses.length,investments:S.invs.length,cards:S.cards.length,wants:S.wants.length,categories:S.cats.length},profile:S.profile,cats:S.cats,budget:S.budget,expenses:S.expenses,invs:S.invs,cards:S.cards,wants:S.wants,inflationRate:S.inflationRate||6};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`moneta-backup-${today()}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  S.lastExportDate=today();save();
  showToast('✓ Backup downloaded — keep it somewhere safe!','green');
  if(S.view==='backup')renderBackup();else renderSidebar();
}

function triggerImport(){el('file-import').click();}

function handleImportFile(evt){
  const file=evt.target.files[0];if(!file)return;
  evt.target.value='';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data._monetaBackup){alert('This file is not a valid Moneta backup.\n\nOnly import .json files exported from Moneta.');return;}
      showImportPreview(data);
    }catch(err){alert('Could not read this file.\n\nMake sure it is a valid JSON file exported from Moneta.');}
  };
  reader.readAsText(file);
}

let _pendingImport=null;
function showImportPreview(data){
  _pendingImport=data;
  const expDate=data._exportDate?new Date(data._exportDate).toLocaleString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'Unknown date';
  const p=data.profile||{};
  const curTotal=S.expenses.length+S.invs.length+S.cards.length+S.wants.length;
  openModal(`
  <div class="mhd"><h2>Import Backup</h2><button class="btn-del" onclick="closeModal()">${ICONS.x}</button></div>
  <div style="background:var(--bg);border-radius:10px;padding:14px 16px;margin-bottom:14px">
    <div style="font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Backup details</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">${expDate}</div>
    <div style="font-size:12px;color:var(--muted)">${p.name?`Profile: ${p.name}`:'No profile'}${p.salary?' · '+fmt(p.salary)+'/mo':''}</div>
    ${data._version?`<div style="font-size:10px;color:var(--subtle);margin-top:3px">Moneta backup v${data._version}</div>`:''}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
    ${[['💸 Expenses',(data.expenses||[]).length+' records'],['📈 Investments',(data.invs||[]).length+' instruments'],['💳 Credit Cards',(data.cards||[]).length+' cards'],['⭐ Goals',(data.wants||[]).length+' wants'],['📂 Categories',(data.cats||[]).length+' categories'],['💰 Budget',Object.keys(data.budget||{}).length+' allocations']].map(([l,v])=>`<div style="background:var(--surf2);border-radius:8px;padding:10px 12px"><div style="font-size:12px;font-weight:500">${l}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${v}</div></div>`).join('')}
  </div>
  <div class="alert ae" style="margin-bottom:14px">${ICONS.warn} <span>This will <strong>permanently replace ALL current data</strong>. Your ${curTotal} existing records will be deleted.</span></div>
  <div style="display:flex;gap:8px">
    <button class="btn-s" onclick="closeModal()" style="flex:1">Cancel</button>
    <button style="flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer" onclick="confirmImport()">Import & Replace All</button>
  </div>`);
}

function confirmImport(){
  const data=_pendingImport;if(!data)return;
  if(data.profile)S.profile=data.profile;
  if(data.cats&&data.cats.length)S.cats=data.cats;
  if(data.budget)S.budget=data.budget;
  if(data.expenses)S.expenses=data.expenses;
  if(data.invs)S.invs=data.invs;
  if(data.cards)S.cards=data.cards;
  if(data.wants)S.wants=data.wants;
  if(data.inflationRate)S.inflationRate=data.inflationRate;
  S.lastExportDate=data._exportDate?data._exportDate.slice(0,10):null;
  _pendingImport=null;save();closeModal();renderSidebar();navigate('dashboard');
  showToast(`✓ Imported! ${S.expenses.length} expenses, ${S.invs.length} investments, ${S.cards.length} cards, ${S.wants.length} goals restored.`,'green');
}

function clearAllData(){
  if(!confirm('⚠️ This permanently deletes ALL financial data — every expense, investment, card, goal, and setting.\n\nThis CANNOT be undone. Are you absolutely sure?'))return;
  if(!confirm('Final confirmation: Delete everything and start fresh?'))return;
  try{localStorage.removeItem('moneta2');localStorage.removeItem('moneta');}catch(e){}
  S.profile={name:'',salary:0};
  S.cats=[...DEFAULT_CATS.map(c=>({...c}))];
  S.budget=Object.fromEntries(DEFAULT_CATS.map(c=>[c.id,c.def]));
  S.expenses=[];S.invs=[];S.cards=[];S.wants=[];S.incomes=[];S.recurs=[];
  S.inflationRate=6;S.lastExportDate=null;
  S.expFilter={month:thisMonth(),cat:'all',payMode:'all'};
  renderSidebar();navigate('dashboard');setTimeout(openSetup,400);
}

function showToast(msg,type='green'){
  const t=document.createElement('div');
  const bg=type==='green'?'#10D9A8':'#F43F5E';
  const col=type==='green'?'#042e24':'#fff';
  t.style.cssText=`position:fixed;bottom:24px;right:24px;background:${bg};color:${col};padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;font-family:'Space Grotesk',sans-serif;box-shadow:0 4px 24px rgba(0,0,0,.5);transition:opacity 0.3s;max-width:400px;line-height:1.4`;
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),320);},4000);
}

function renderBackup(){
  const totalRec=S.expenses.length+S.invs.length+S.cards.length+S.wants.length;
  const hasData=totalRec>0||S.profile.name;
  const days=S.lastExportDate?Math.floor((new Date()-new Date(S.lastExportDate))/(1000*60*60*24)):-1;
  const bAge=days<0?'Never backed up':`Last backup: ${days===0?'Today':days===1?'Yesterday':days+' days ago'}`;
  const bSt=days<0?(hasData?'none':'clean'):days<=7?'good':days<=14?'warn':'stale';
  const stConf={
    none:{col:'var(--red)',bg:'#F43F5E0D',icon:'⛔',msg:'You have data but <strong>no backup yet</strong>. If you clear this browser or switch devices, everything will be lost.'},
    clean:{col:'var(--muted)',bg:'var(--surf2)',icon:'💤',msg:'No data to back up yet. Start adding records and export regularly.'},
    good:{col:'var(--green)',bg:'#10D9A80D',icon:'✅',msg:`Backed up <strong>${days===0?'today':days+' day'+( days!==1?'s':'')+' ago'}</strong>. Your data is safe.`},
    warn:{col:'var(--amber)',bg:'#F59E0B0D',icon:'⚠️',msg:`Last backup was <strong>${days} days ago</strong>. Consider exporting again soon.`},
    stale:{col:'var(--red)',bg:'#F43F5E0D',icon:'🔴',msg:`Last backup was <strong>${days} days ago</strong>. Your recent records are at risk — export now.`},
  }[bSt];

  let sizeStr='—';
  try{const b=new TextEncoder().encode(JSON.stringify({profile:S.profile,cats:S.cats,budget:S.budget,expenses:S.expenses,invs:S.invs,cards:S.cards,wants:S.wants})).length;sizeStr=b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(2)+' MB';}catch(e){}
  const allDates=[...S.expenses,...S.invs].map(x=>x.date).filter(Boolean).sort();
  const oldestDate=allDates[0]?new Date(allDates[0]).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}):'—';

  el('main').innerHTML=`
  <div class="phd">
    <div><h1>Backup & Data</h1><p>Export, import, and protect your financial records</p></div>
    <button class="btn" onclick="exportData()">${ICONS.download} Export Now</button>
  </div>

  <!-- Status -->
  <div style="background:${stConf.bg};border:1px solid ${stConf.col}44;border-left:4px solid ${stConf.col};border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px">
    <span style="font-size:24px;flex-shrink:0">${stConf.icon}</span>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:600;color:${stConf.col};margin-bottom:3px">${bAge}</div>
      <div style="font-size:12px;color:#B0B0C8">${stConf.msg}</div>
    </div>
    ${bSt!=='good'&&bSt!=='clean'?`<button class="btn" onclick="exportData()" style="flex-shrink:0">${ICONS.download} Backup Now</button>`:''}
  </div>

  <!-- Summary strip -->
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px">
    ${[['💸','Expenses',S.expenses.length],['📈','Investments',S.invs.length],['💳','Cards',S.cards.length],['⭐','Goals',S.wants.length],['📂','Categories',S.cats.length],['💾','Data',sizeStr]].map(([e,l,v])=>`<div style="background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:12px 10px;text-align:center"><div style="font-size:18px;margin-bottom:4px">${e}</div><div class="mono" style="font-size:15px;font-weight:700">${v}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${l}</div></div>`).join('')}
  </div>

  <!-- Meta strip -->
  <div style="background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:13px 18px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap">
    ${[['Tracking since',oldestDate],['Storage','localStorage (this browser only)'],['Profile',S.profile.name||'Not set'],['Salary',S.profile.salary?fmt(S.profile.salary)+'/mo':'Not set']].map(([l,v])=>`<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">${l}</div><div style="font-size:13px;font-weight:500">${v}</div></div>`).join('')}
  </div>

  <div class="grid2" style="margin-bottom:16px">
    <!-- Export -->
    <div class="card">
      <div class="sec">${ICONS.download} Export Your Data</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Download a complete snapshot as a <code style="background:var(--bg);padding:1px 6px;border-radius:4px;font-size:11px">.json</code> file. Save it to Google Drive, email it to yourself, or keep it on a USB drive.</p>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
        ${['All expenses, categories & dates','Investments, rates & portfolio data','Credit cards & payment history','Goals, timelines & contributions','Budget allocations & all settings','Profile, salary & preferences'].map(item=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:#B0B0C8"><span style="color:var(--green);flex-shrink:0">${ICONS.check}</span>${item}</div>`).join('')}
      </div>
      <div style="background:var(--bg);border-radius:8px;padding:10px 13px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--muted)">📁 <code style="font-size:11px">moneta-backup-${today()}.json</code></span>
        <span style="font-size:10px;color:var(--subtle)">${sizeStr}</span>
      </div>
      <button class="btn" onclick="exportData()" style="width:100%;justify-content:center">${ICONS.download} Download Backup File</button>
    </div>

    <!-- Import -->
    <div class="card">
      <div class="sec">${ICONS.upload} Restore from Backup</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Import a previously exported backup file. Use this to <strong style="color:var(--text)">switch devices</strong>, recover lost data, or transfer to a new browser.</p>
      <div class="alert ae" style="margin-bottom:14px">${ICONS.warn} <span>Importing <strong>replaces ALL current data</strong>. Export first if you want to keep your existing ${totalRec} records.</span></div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
        ${['Locate your moneta-backup-*.json file','Click the button below and select the file','Review the backup summary and confirm'].map((s,i)=>`<div style="display:flex;align-items:center;gap:9px;font-size:12px;color:#B0B0C8"><span style="width:18px;height:18px;background:var(--surf2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:700">${i+1}</span>${s}</div>`).join('')}
      </div>
      <button class="btn-s" onclick="triggerImport()" style="width:100%;justify-content:center">${ICONS.upload} Select Backup File to Import</button>
    </div>
  </div>

  <div class="grid2">
    <!-- Tips -->
    <div class="card">
      <div class="sec">🔒 How to Keep Your Data Safe</div>
      <div style="display:flex;flex-direction:column;gap:11px">
        ${[['📁','Export weekly','Back up after every major entry session or at least once a week'],['☁️','Cloud storage','Save the backup to Google Drive, OneDrive, or iCloud immediately'],['📧','Email yourself','Attach the .json to an email draft for a quick off-device copy'],['📱','Cross-device','Export on your laptop → import on your phone (or vice versa)'],['🚫','Never clear','Avoid clearing browser data or switching browsers without exporting first'],['🔄','New browser','Export → import in the new browser. Don\'t assume data transfers automatically']].map(([e,t,d])=>`<div style="display:flex;gap:10px"><span style="font-size:16px;flex-shrink:0;margin-top:1px">${e}</span><div><div style="font-size:12px;font-weight:600">${t}</div><div style="font-size:11px;color:var(--muted);margin-top:1px">${d}</div></div></div>`).join('')}
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="card" style="border-color:#F43F5E33">
      <div class="sec" style="color:var(--red)">⚠️ Danger Zone</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">These actions are <strong>permanent and irreversible</strong>. Export a backup before proceeding.</p>
      <div style="background:var(--bg);border-radius:9px;padding:14px 15px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">Clear All Data & Reset</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Deletes every expense, investment, card, goal, budget setting, and profile. App resets to blank state.</div>
        <button onclick="clearAllData()" style="width:100%;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:9px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">${ICONS.trash} Delete Everything & Start Over</button>
      </div>
      <div style="font-size:11px;color:var(--subtle);display:flex;flex-direction:column;gap:4px">
        <div>• You will be asked to confirm <strong>twice</strong> before deletion</div>
        <div>• Only affects <strong>this browser</strong> — other devices unaffected</div>
        <div>• Removes <code>moneta</code> and <code>moneta2</code> from localStorage</div>
      </div>
    </div>
  </div>`;
}

function init(){load();renderSidebar();navigate('dashboard');if(!S.profile.name)setTimeout(openSetup,400);}
init();
</script>
