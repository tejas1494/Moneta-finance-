<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moneta – Personal Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0B0B0F;--surf:#13131A;--surf2:#1C1C27;--border:#252535;--accent:#7C5CFC;--green:#10D9A8;--amber:#F59E0B;--red:#F43F5E;--text:#F0F0F8;--muted:#7A7A92;--subtle:#2C2C40}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
#app{display:flex;height:100vh}
#sb{width:218px;background:#0D0D14;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;flex-shrink:0;overflow-y:auto}
#main{flex:1;overflow-y:auto;padding:26px 28px;min-width:0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:24px}
.logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-0.4px}
.logo-sub{font-size:10px;color:var(--subtle);margin-left:39px;margin-top:-22px;margin-bottom:8px}
nav{flex:1;display:flex;flex-direction:column;gap:3px;margin-top:4px}
.nb{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:400;transition:all 0.12s;text-align:left;width:100%}
.nb:hover{color:var(--text)}.nb.active{background:#7C5CFC22;color:var(--accent);font-weight:600}.nb svg{flex-shrink:0}
.nb-section{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--subtle);padding:10px 11px 4px;margin-top:4px}
.sb-prof{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:9px;border:none;cursor:pointer;background:transparent;width:100%;text-align:left;margin-top:6px}
.sb-av{width:28px;height:28px;background:var(--surf2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--accent);flex-shrink:0}
.sb-pname{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.sb-psal{font-size:10px;color:var(--subtle)}
.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:20px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity 0.1s}
.btn:hover{opacity:.88}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:var(--surf2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-s:hover{background:var(--border)}
.btn-xs{background:var(--surf2);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:12px;font-family:'Space Grotesk',sans-serif;cursor:pointer;font-weight:600;transition:all 0.1s;line-height:1.6}
.btn-xs:hover{color:var(--text);border-color:var(--accent)}
.btn-del{background:transparent;color:var(--subtle);border:none;cursor:pointer;padding:4px;display:flex;align-items:center;border-radius:5px;transition:color 0.1s}
.btn-del:hover{color:var(--red)}
.btn-g{background:var(--green);color:#0a2e28;border:none;border-radius:8px;padding:9px 16px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-g:hover{opacity:.88}
input,select,textarea{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;width:100%;outline:none;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select{-webkit-appearance:none;color-scheme:dark}
input[type=range]{-webkit-appearance:none;appearance:none;height:3px;background:var(--border);border:none;border-radius:3px;padding:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;cursor:pointer;border:none}
input[type=color]{padding:3px;height:34px;border-radius:6px;cursor:pointer;width:100%}
input[type=checkbox]{width:auto;cursor:pointer}
label{cursor:pointer}
.lbl{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:5px;display:block}
.badge{display:inline-block;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600}
.sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:13px}
.mono{font-family:'JetBrains Mono',monospace}
.c-acc{color:var(--accent)}.c-g{color:var(--green)}.c-a{color:var(--amber)}.c-r{color:var(--red)}.c-m{color:var(--muted)}
.phd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.phd h1{font-size:22px;font-weight:700;letter-spacing:-0.4px}
.phd p{color:var(--muted);font-size:13px;margin-top:4px}
.empty{padding:48px 0;text-align:center;color:var(--subtle)}
.empty .ei{font-size:38px;margin-bottom:10px}
.empty p{font-size:13px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surf2)}
.progress{height:4px;background:var(--surf2);border-radius:4px;overflow:hidden}
.pbar{height:100%;border-radius:4px;transition:width 0.4s}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.alert{border-radius:8px;padding:10px 13px;font-size:12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.alert svg{flex-shrink:0;margin-top:1px}
.aw{background:#F59E0B18;border:1px solid #F59E0B44;color:var(--amber)}
.ae{background:#F43F5E18;border:1px solid #F43F5E44;color:var(--red)}
.ag{background:#10D9A818;border:1px solid #10D9A844;color:var(--green)}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center}
#ov.open{display:flex}
#modal{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:24px;width:480px;max-width:94vw;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.6)}
#modal.wide{width:680px}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mhd h2{font-size:17px;font-weight:700}
.fcol{display:flex;flex-direction:column;gap:13px}
.frow{display:flex;gap:10px}.frow>*{flex:1}
.toggle-row{display:flex;background:var(--surf2);border-radius:8px;padding:3px;gap:3px}
.toggle-btn{flex:1;padding:7px;border:none;border-radius:6px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all 0.15s}
.toggle-btn.active{background:var(--accent);color:#fff}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all 0.1s}
.sw.sel{border-color:#fff;transform:scale(1.12)}
.stat-card{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.stat-val{font-size:21px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--muted);margin-top:5px}
.cat-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
/* Credit Card Tile */
.cc-tile{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:18px;border-top-width:3px;display:flex;flex-direction:column;gap:0}
.cc-util-bar{height:8px;background:var(--surf2);border-radius:8px;overflow:hidden;margin:6px 0}
.cc-util-fill{height:100%;border-radius:8px;transition:width 0.5s}
.cc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:12px 0}
.cc-info-cell{background:var(--bg);border-radius:8px;padding:9px 11px}
.cc-info-lbl{font-size:10px;color:var(--muted);margin-bottom:3px}
.cc-info-val{font-size:13px;font-weight:600}
.cc-status{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:1px solid;margin:10px 0}
.pay-quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.pay-opt{border:1px solid var(--border);border-radius:9px;padding:10px 8px;cursor:pointer;text-align:center;background:var(--surf2);transition:all 0.15s;font-family:'Space Grotesk',sans-serif;color:var(--text)}
.pay-opt:hover{border-color:var(--accent);background:var(--accent)22}
.pay-opt.sel{border-color:var(--accent);background:var(--accent)22}
.pay-opt-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.pay-opt-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.hist-entry{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-entry:last-child{border-bottom:none}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:960px){#sb{width:56px;padding:14px 8px}.logo-name,.logo-sub,.nb span,.sb-pname,.sb-psal,.nb-section{display:none}.nb{justify-content:center;padding:9px}.sb-prof{justify-content:center}.sb-av{width:32px;height:32px}}
</style>
</head>
<body>
<div id="app"><aside id="sb"></aside><main id="main"></main></div>
<div id="ov" onclick="ovClick(event)"><div id="modal"></div></div>
<input type="file" id="file-import" accept=".json" style="display:none" onchange="handleImportFile(event)">
<script>
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const DEFAULT_CATS=[
  {id:'rent',label:'Rent & Housing',emoji:'🏠',color:'#7C5CFC',builtIn:true,def:30},

const FIXED_CATS=['rent','investments','emergency','health'];

const INCOME_TYPES=[

const RECUR_FREQS=[

  {id:'weekly',   label:'Weekly',     sub:'Once a week'},
  {id:'monthly',  label:'Monthly',    sub:'Once a month'},
  {id:'quarterly',label:'Quarterly',  sub:'Every 3 months'},
  {id:'annual',   label:'Annual',     sub:'Once a year'},
];
const WEEK_DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const NAV=[
  {id:'dashboard',label:'Dashboard',icon:'home',section:null},
  {id:'expenses',label:'Expenses',icon:'list',section:null},
  {id:'income',label:'Income',icon:'income',section:null},
  {id:'recurring',label:'Recurring',icon:'recurring',section:null},

  {id:'budget',label:'Budget',icon:'wallet',section:'Settings'},

];

const ICONS={
  home:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>`,

  recurring:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17,1 21,5 17,9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,

  trash:`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`,
  x:`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  warn:`<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,

  edit:`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,

// ═══════════════════════════════════════
// RECURRING TRANSACTION MATH
// ═══════════════════════════════════════
function recurNextDueDate(rec){
  const n=new Date(),td=n.getDate(),yr=n.getFullYear(),mo=n.getMonth();
  if(rec.freq==='monthly'){const dd=Number(rec.dueDay)||1;return td<=dd?new Date(yr,mo,dd):new Date(yr,mo+1,dd);}
  if(rec.freq==='weekly'){const t=Number(rec.dueWeekDay)||1,c=n.getDay(),d=(t-c+7)%7||7;return new Date(n.getTime()+d*86400000);}
  if(rec.freq==='daily'){return new Date(yr,mo,td+1);}
  if(rec.freq==='quarterly'){const s=new Date(rec.startDate),ms=(yr-s.getFullYear())*12+mo-s.getMonth(),nq=Math.ceil((ms+0.01)/3)*3,nm=s.getMonth()+nq;return new Date(s.getFullYear()+Math.floor(nm/12),nm%12,s.getDate());}
  if(rec.freq==='annual'){const s=new Date(rec.startDate),d=new Date(yr,s.getMonth(),s.getDate());if(d<n)d.setFullYear(yr+1);return d;}
  return n;
}
function recurDaysUntilDue(rec){return Math.ceil((recurNextDueDate(rec)-new Date())/(1000*60*60*24));}
function recurIsLoggedThisPeriod(rec){
  if(!rec.lastLoggedDate)return false;
  const l=new Date(rec.lastLoggedDate),n=new Date();
  if(rec.freq==='monthly')return l.getFullYear()===n.getFullYear()&&l.getMonth()===n.getMonth();
  if(rec.freq==='weekly')return(n-l)<7*86400000;
  if(rec.freq==='daily')return l.toDateString()===n.toDateString();
  if(rec.freq==='quarterly')return(n.getFullYear()-l.getFullYear())*12+n.getMonth()-l.getMonth()<3;
  if(rec.freq==='annual')return l.getFullYear()===n.getFullYear();
  return false;
}
function recurStatus(rec){
  if(rec.status==='paused')return'paused';
  if(recurIsLoggedThisPeriod(rec))return'logged';
  const d=recurDaysUntilDue(rec);
  if(d<0)return'overdue';
  if(d===0)return'due_today';
  if(d<=5)return'due_soon';
  return'upcoming';
}
function recurFreqLabel(rec){
  if(rec.freq==='monthly')return`${ordinal(rec.dueDay||1)} of every month`;
  if(rec.freq==='weekly')return`Every ${WEEK_DAYS[rec.dueWeekDay||1]}`;
  if(rec.freq==='daily')return'Every day';
  if(rec.freq==='quarterly')return'Every 3 months';
  if(rec.freq==='annual')return'Once a year';
  return rec.freq;
}
function recurMonthlyAmt(rec){
  const a=Number(rec.amt)||0;
  if(rec.freq==='monthly')return a;
  if(rec.freq==='weekly')return a*52/12;
  if(rec.freq==='daily')return a*365/12;
  if(rec.freq==='quarterly')return a/3;
  if(rec.freq==='annual')return a/12;
  return 0;
}
function greet(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening';}
function ordinal(n){if(n%10===1&&n%100!==11)return n+'st';if(n%10===2&&n%100!==12)return n+'nd';if(n%10===3&&n%100!==13)return n+'rd';return n+'th';}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ═══════════════════════════════════════
// INVESTMENT MATH
// ═══════════════════════════════════════
function calcSIP(monthly,annualPct,months){if(months<=0)return 0;const r=annualPct/100/12;if(!r)return monthly*months;return monthly*((Math.pow(1+r,months)-1)/r)*(1+r);}
function calcLump(p,annualPct,years){if(years<=0)return Number(p)||0;return(Number(p)||0)*Math.pow(1+annualPct/100,years);}
function moElapsed(d){const s=new Date(d),n=new Date();return Math.max(0,(n.getFullYear()-s.getFullYear())*12+n.getMonth()-s.getMonth());}
function invCurrentValue(inv){const rate=Number(inv.rate)||0,amt=Number(inv.amt)||0,mo=moElapsed(inv.date);return inv.mode==='sip'?calcSIP(amt,rate,Math.max(1,mo)):calcLump(amt,rate,mo/12);}
function invTotalInvested(inv){const mo=Math.max(1,moElapsed(inv.date));return inv.mode==='sip'?Number(inv.amt)*mo:Number(inv.amt);}
function invProjectedAt(inv,addYrs){const rate=Number(inv.rate)||0,amt=Number(inv.amt)||0,mo=moElapsed(inv.date);return inv.mode==='sip'?calcSIP(amt,rate,mo+addYrs*12):calcLump(amt,rate,mo/12+addYrs);}
function invGainPct(inv){const cur=invCurrentValue(inv),inv0=invTotalInvested(inv);return inv0>0?(cur-inv0)/inv0*100:0;}

// Every SIP active this month + lump sums made this month = total investment outflow
function thisMonthInvOutflow(){
  const key=thisMonth();
  return S.invs.reduce((s,inv)=>{
    if(inv.mode==='sip'&&mKey(inv.date)<=key)return s+Number(inv.amt);
    if(inv.mode!=='sip'&&mKey(inv.date)===key)return s+Number(inv.amt);
    return s;
  },0);
}

// ═══════════════════════════════════════
// WANTS & GOALS MATH
// ═══════════════════════════════════════
function wantTotalSaved(w){return(w.contributions||[]).reduce((s,c)=>s+Number(c.amount),0);}
function wantRemaining(w){return Math.max(0,Number(w.targetAmount||0)-wantTotalSaved(w));}
function wantProgress(w){const t=Number(w.targetAmount)||1;return Math.min(100,wantTotalSaved(w)/t*100);}
function wantMonthsLeft(w){
  if(w.targetDate){const d=new Date(w.targetDate),n=new Date();return Math.max(1,Math.ceil((d-n)/(1000*60*60*24*30.44)));}
  return Math.max(1,Number(w.monthsDuration)||6);
}
function wantMonthlyNeeded(w){
  const rem=wantRemaining(w);
  return rem<=0?0:Math.ceil(rem/wantMonthsLeft(w));
}

// Smart saving plan: given total monthly amount needed, suggest cuts from FLEXIBLE categories only
function savingSuggestions(monthlyNeeded){
  if(monthlyNeeded<=0)return{suggestions:[],canCover:true,shortfall:0};
  const sal=Number(S.profile.salary)||0;
  const flex=S.cats.filter(c=>!FIXED_CATS.includes(c.id));
  const thisMoExp=S.expenses.filter(e=>mKey(e.date)===thisMonth());
  const options=flex.map(c=>{
    const budget=(S.budget[c.id]||0)/100*sal;
    const spent=thisMoExp.filter(e=>e.cat===c.id).reduce((s,e)=>s+Number(e.amt),0);
    const maxCut=budget*0.45; // suggest cutting up to 45% of each category
    return{cat:c,budget,spent,maxCut};
  }).filter(o=>o.budget>0).sort((a,b)=>b.budget-a.budget);
  
  const totalMaxCut=options.reduce((s,o)=>s+o.maxCut,0);
  const suggestions=[];
  let remaining=monthlyNeeded;
  
  for(const opt of options){
    if(remaining<=0)break;
    // Cut proportional to category size, up to maxCut
    const proportion=opt.budget/(options.reduce((s,o)=>s+o.budget,0)||1);
    const cut=Math.min(remaining,Math.max(opt.budget*0.1,opt.maxCut));
    const actualCut=Math.min(cut,remaining);
    if(actualCut>=50){
      suggestions.push({cat:opt.cat,budget:opt.budget,spent:opt.spent,suggestedCut:Math.ceil(actualCut),newBudget:Math.max(0,Math.floor(opt.budget-actualCut))});
      remaining-=actualCut;
    }
  }
  return{suggestions,canCover:remaining<=0,shortfall:Math.max(0,remaining)};
}

// ═══════════════════════════════════════
// CREDIT CARD MATH
// ═══════════════════════════════════════
function cardOutstanding(card){
  const charges=S.expenses.filter(e=>e.cardId===card.id).reduce((s,e)=>s+Number(e.amt),0);
  const paid=(card.payments||[]).reduce((s,p)=>s+Number(p.amount),0);
  return Math.max(0,(Number(card.initialBalance)||0)+charges-paid);
}
function cardTotalCharged(card){
  return (Number(card.initialBalance)||0)+S.expenses.filter(e=>e.cardId===card.id).reduce((s,e)=>s+Number(e.amt),0);
}
function cardTotalPaid(card){
  return (card.payments||[]).reduce((s,p)=>s+Number(p.amount),0);
}
function cardUtilPct(card){
  const lim=Number(card.limit)||1;
  return clamp(cardOutstanding(card)/lim*100,0,100);
}
function cardNextDueDate(card){
  const now=new Date(),dd=Number(card.dueDay)||25;
  const thisMonthDue=new Date(now.getFullYear(),now.getMonth(),dd);
  return thisMonthDue>=now?thisMonthDue:new Date(now.getFullYear(),now.getMonth()+1,dd);
}
function cardDaysUntilDue(card){
  const diff=cardNextDueDate(card)-new Date();
  return Math.ceil(diff/(1000*60*60*24));
}
function cardStatus(card){
  const out=cardOutstanding(card),days=cardDaysUntilDue(card);
  if(out<=0)return'clear';
  if(days<0)return'overdue';
  if(days<=5)return'urgent';
  if(days<=10)return'soon';
  return'ok';
}
function cardMinDue(card){
  const out=cardOutstanding(card);
  return Math.max(200,out*(Number(card.minDuePct)||5)/100);
}
function cardInterestDue(card){
  const out=cardOutstanding(card),days=Math.max(0,-cardDaysUntilDue(card));
  if(days===0||out<=0)return 0;
  const dailyRate=(Number(card.interestRate)||3.5)/100/30;
  return out*dailyRate*days;
}
function cardCurrentCycleCharges(card){
  const now=new Date(),bd=Number(card.billingDay)||5;
  let start;
  if(now.getDate()>=bd)start=new Date(now.getFullYear(),now.getMonth(),bd);
  else start=new Date(now.getFullYear(),now.getMonth()-1,bd);
  const startStr=start.toISOString().slice(0,10);
  return S.expenses.filter(e=>e.cardId===card.id&&e.date>=startStr).reduce((s,e)=>s+Number(e.amt),0);
}
function cardPaymentThisCycle(card){
  const now=new Date(),bd=Number(card.billingDay)||5;
  let start;
  if(now.getDate()>=bd)start=new Date(now.getFullYear(),now.getMonth(),bd);
  else start=new Date(now.getFullYear(),now.getMonth()-1,bd);
  const startStr=start.toISOString().slice(0,10);
  return(card.payments||[]).filter(p=>p.date>=startStr).reduce((s,p)=>s+Number(p.amount),0);
}

    </div>
  </div>

  ${alertRec.length?`

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="sec" style="margin-bottom:0">🔄 Recurring Bills — Action Required</div>

        ${alertRec.length>1?`<button class="btn-g" onclick="logAllDue()" style="padding:6px 12px;font-size:12px">Log All (${alertRec.length})</button>`:''}

      </div>

      const cat=getCat(r.cat),st=recurStatus(r),days=recurDaysUntilDue(r);

      const stTxt=st==='overdue'?Math.abs(days)+'d overdue ⚠️':st==='due_today'?'Due today':'Due in '+days+'d';

        <div style="width:34px;height:34px;background:${cat.color}22;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${cat.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${r.name}</div>
          <div style="font-size:11px;color:${stCol};margin-top:1px">${stTxt} · ${recurFreqLabel(r)}</div>
        </div>
        <span class="mono" style="font-weight:700;font-size:13px;white-space:nowrap">${fmt(r.amt)}</span>
        <button class="btn" onclick="logRecurring('${r.id}')" style="padding:6px 12px;font-size:12px;flex-shrink:0">Log</button>
      </div>`;
    }).join('')}</div>
    ${monthlyObligations>0?`<div style="border-top:1px solid var(--border);padding-top:10px;margin-top:6px;display:flex;justify-content:space-between;font-size:12px"><span class="c-m">Total monthly obligations</span><span class="mono" style="font-weight:700">${fmt(monthlyObligations)}/mo</span></div>`:''}
  </div>`:''}`;

  const allocData=S.cats.map(c=>({v:S.budget[c.id]||0,c:c.color})).filter(d=>d.v>0);
  if(allocData.length)charts.alloc=new Chart(el('ch-alloc'),{type:'doughnut',data:{datasets:[{data:allocData.map(d=>d.v),backgroundColor:allocData.map(d=>d.c),borderWidth:0}]},options:{cutout:'65%',plugins:{legend:{display:false}},animation:{duration:500}}});
  // Spending donut: expense categories + investments outflow as a separate segment
  const spendDataRaw=S.cats.filter(c=>spentByCat[c.id]&&c.id!=='investments').map(c=>({v:spentByCat[c.id],c:c.color}));

  if(spendDataRaw.length)charts.spend=new Chart(el('ch-spend'),{type:'doughnut',data:{datasets:[{data:spendDataRaw.map(d=>d.v),backgroundColor:spendDataRaw.map(d=>d.c),borderWidth:0}]},options:{cutout:'65%',plugins:{legend:{display:false}},animation:{duration:500}}});
}

function renderExpenses(){
  const fMo=S.expFilter.month,fCat=S.expFilter.cat,fPay=S.expFilter.payMode;
  const months=[...new Set(S.expenses.map(e=>mKey(e.date)))];
  if(!months.includes(thisMonth()))months.unshift(thisMonth());
  months.sort().reverse();
  const filtered=S.expenses.filter(e=>
    (fMo==='all'||mKey(e.date)===fMo)&&
    (fCat==='all'||e.cat===fCat)&&
    (fPay==='all'||(fPay==='card'?!!e.cardId:!e.cardId))
  );
  const total=filtered.reduce((s,e)=>s+Number(e.amt),0);
  const cardTotal=filtered.filter(e=>e.cardId).reduce((s,e)=>s+Number(e.amt),0);
  const sal=Number(S.profile.salary)||0;

  el('main').innerHTML=`
  <div class="phd">
    <div><h1>Expenses</h1><p>Track every rupee — cash, UPI, and credit card</p></div>
    <button class="btn" onclick="openAddExpense()">${ICONS.plus} Add Expense</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
    <select style="width:auto" onchange="S.expFilter.month=this.value;renderExpenses()">
      <option value="all" ${fMo==='all'?'selected':''}>All months</option>
      ${months.map(m=>`<option value="${m}" ${fMo===m?'selected':''}>${mLabel(m)}</option>`).join('')}
    </select>
    <select style="width:auto" onchange="S.expFilter.cat=this.value;renderExpenses()">
      <option value="all" ${fCat==='all'?'selected':''}>All categories</option>
      ${S.cats.map(c=>`<option value="${c.id}" ${fCat===c.id?'selected':''}>${c.emoji} ${c.label}</option>`).join('')}
    </select>
    <select style="width:auto" onchange="S.expFilter.payMode=this.value;renderExpenses()">
      <option value="all" ${fPay==='all'?'selected':''}>All payment modes</option>
      <option value="cash" ${fPay==='cash'?'selected':''}>💵 Cash / UPI</option>
      <option value="card" ${fPay==='card'?'selected':''}>💳 Credit Card</option>
    </select>
    <div style="flex:1"></div>
    <div class="card" style="padding:8px 14px;display:inline-flex;gap:14px;align-items:center;border-radius:10px">
      <span style="font-size:12px;color:var(--muted)">Total:</span>
      <span class="mono c-r" style="font-weight:700">${fmt(total)}</span>
      ${cardTotal>0?`<span style="font-size:11px;color:var(--muted)">💳 ${fmt(cardTotal)}</span>`:''}
      ${sal>0?`<span style="font-size:11px;color:var(--subtle)">${Math.round(total/sal*100)}% of salary</span>`:''}
    </div>
  </div>
  <div class="card">
    ${filtered.length?`<div>${filtered.map((e,i)=>{
      const cat=getCat(e.cat),card=e.cardId?getCard(e.cardId):null;
      return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;${i<filtered.length-1?'border-bottom:1px solid var(--border)':''}">
        <div style="width:38px;height:38px;background:${cat.color}22;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">${cat.emoji}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.desc||cat.label}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:7px;align-items:center;flex-wrap:wrap">
            <span>${e.date}</span>
            <span class="badge" style="background:${cat.color}22;color:${cat.color}">${cat.label}</span>
            ${card?`<span class="badge" style="background:${card.color}22;color:${card.color}">💳 ${card.name}</span>`:`<span class="badge" style="background:#6B728022;color:#9BA3B2">💵 Cash/UPI</span>`}
          </div>
        </div>
        <span class="mono c-r" style="font-weight:700;font-size:14px;white-space:nowrap">-${fmt(e.amt)}</span>
        <button class="btn-del" onclick="delExpense('${e.id}')">${ICONS.trash}</button>
      </div>`;
    }).join('')}</div>`:`<div class="empty"><div class="ei">🧾</div><p>No expenses found</p></div>`}
  </div>`;
}
function delExpense(id){S.expenses=S.expenses.filter(e=>e.id!==id);save();renderExpenses();}

function renderIncome(){
  const now=new Date();
  const fMo=S._incFilter||thisMonth();
  const months=[...new Set(S.incomes.map(i=>mKey(i.date)))];
  if(!months.includes(thisMonth()))months.unshift(thisMonth());
  months.sort().reverse();

  const filtered=S.incomes.filter(i=>fMo==='all'||mKey(i.date)===fMo);
  const sal=Number(S.profile.salary)||0;
  const thisMoInc=S.incomes.filter(i=>mKey(i.date)===thisMonth()).reduce((s,i)=>s+Number(i.amt),0);

  // Last month
  const lmD=new Date(now.getFullYear(),now.getMonth()-1,1);
  const lastMoKey=`${lmD.getFullYear()}-${String(lmD.getMonth()+1).padStart(2,'0')}`;
  const lastMoInc=S.incomes.filter(i=>mKey(i.date)===lastMoKey).reduce((s,i)=>s+Number(i.amt),0);
  const momChg=lastMoInc>0?((thisMoInc-lastMoInc)/lastMoInc*100):null;

  // YTD & avg
  const yr=now.getFullYear().toString();
  const ytd=S.incomes.filter(i=>i.date.startsWith(yr)).reduce((s,i)=>s+Number(i.amt),0);
  const last3=[0,1,2].map(i=>{const d=new Date(now.getFullYear(),now.getMonth()-i,1),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;return S.incomes.filter(e=>mKey(e.date)===k).reduce((s,e)=>s+Number(e.amt),0);}).filter(v=>v>0);
  const avgInc=last3.length?Math.round(last3.reduce((s,v)=>s+v,0)/last3.length):sal;

  // This month savings rate
  const spent=S.expenses.filter(e=>mKey(e.date)===thisMonth()).reduce((s,e)=>s+Number(e.amt),0);
  const invOut=thisMonthInvOutflow();
  const effectiveInc=thisMoInc>0?thisMoInc:sal;
  const totalOut=spent+invOut;
  const savings=effectiveInc-totalOut;
  const savingsRate=effectiveInc>0?Math.round(savings/effectiveInc*100):0;

  // By type breakdown
  const byType={};
  S.incomes.forEach(i=>{byType[i.type]=(byType[i.type]||0)+Number(i.amt);});

  // 6-month income vs outflow for chart
  const last6=Array.from({length:6},(_,i)=>{
    const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const inc=S.incomes.filter(e=>mKey(e.date)===k).reduce((s,e)=>s+Number(e.amt),0)||(k===thisMonth()?sal:sal);
    const out=S.expenses.filter(e=>mKey(e.date)===k).reduce((s,e)=>s+Number(e.amt),0);
    return{label:d.toLocaleString('en-IN',{month:'short'}),inc,out,saved:Math.max(0,inc-out),key:k};
  });

  // Recurring income
  const recurring=S.incomes.filter(i=>i.isRecurring);

  el('main').innerHTML=`
  <div class="phd">
    <div><h1>Income</h1><p>Track every rupee coming in — salary, freelance, rentals, dividends & more</p></div>
    <button class="btn" onclick="openAddIncome()">${ICONS.plus} Add Income</button>
  </div>

  ${!S.incomes.length?`<div class="alert aw" style="margin-bottom:14px">${ICONS.info} <span>No income logged yet. Your salary (${fmt(sal)}) is used as a baseline. Log actual income to get accurate savings rate and free-money calculations.</span></div>`:''}

  <!-- Stats -->
  <div class="grid4" style="margin-bottom:14px">
    <div class="stat-card">
      <div class="stat-lbl">This Month</div>
      <div class="stat-val" style="color:var(--green)">${fmt(thisMoInc||sal)}</div>
      <div class="stat-sub">${thisMoInc>0?S.incomes.filter(i=>mKey(i.date)===thisMonth()).length+' source(s) logged':'Salary baseline'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">vs Last Month</div>
      <div class="stat-val" style="color:${momChg===null?'var(--muted)':momChg>=0?'var(--green)':'var(--red)'}">${momChg===null?'—':fmtPct(momChg)}</div>
      <div class="stat-sub">${lastMoInc>0?fmt(lastMoInc)+' last month':'No last month data'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">YTD Total</div>
      <div class="stat-val c-acc">${fmt(ytd||sal*now.getMonth())}</div>
      <div class="stat-sub">${now.getFullYear()} so far</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Savings Rate</div>
      <div class="stat-val" style="color:${savingsRate>=20?'var(--green)':savingsRate>=10?'var(--amber)':'var(--red)'}">${savingsRate}%</div>
      <div class="stat-sub">${fmt(Math.max(0,savings))} saved · ${fmt(totalOut)} out</div>
    </div>
  </div>

  <div class="grid2" style="margin-bottom:14px">
    <!-- Income by source -->
    <div class="card">
      <div class="sec">Income Sources (All Time)</div>
      ${S.incomes.length?`
      <div style="display:flex;align-items:flex-start;gap:16px">
        <canvas id="ch-inc" width="130" height="130" style="flex-shrink:0"></canvas>
        <div style="flex:1;display:flex;flex-direction:column;gap:7px;padding-top:4px">
          ${INCOME_TYPES.filter(t=>byType[t.id]).map(t=>`

// RECURRING TRANSACTIONS
// ═══════════════════════════════════════
function logRecurring(id){
  const rec=S.recurs.find(r=>r.id===id);if(!rec)return;
  S.expenses.unshift({id:uid(),cat:rec.cat,amt:Number(rec.amt),desc:rec.name,date:today(),payMode:rec.payMode||'cash',cardId:rec.cardId||null,recurId:rec.id});
  rec.lastLoggedDate=today();
  save();
  showToast(`✓ "${rec.name}" — ${fmt(rec.amt)} logged as expense`,'green');
  if(S.view==='recurring')renderRecurring();
  else if(S.view==='dashboard')renderDashboard();
}

function logAllDue(){
  const due=S.recurs.filter(r=>r.status!=='paused'&&!recurIsLoggedThisPeriod(r)&&['overdue','due_today','due_soon'].includes(recurStatus(r)));
  if(!due.length){showToast('No overdue or due-today recurring transactions','green');return;}
  if(!confirm(`Log ${due.length} recurring transaction${due.length!==1?'s':''}?\n\n${due.map(r=>`${r.name}: ${fmt(r.amt)}`).join('\n')}`))return;
  due.forEach(r=>{
    S.expenses.unshift({id:uid(),cat:r.cat,amt:Number(r.amt),desc:r.name,date:today(),payMode:r.payMode||'cash',cardId:r.cardId||null,recurId:r.id});
    r.lastLoggedDate=today();
  });
  save();
  showToast(`✓ ${due.length} recurring transaction${due.length!==1?'s':''} logged`,'green');
  if(S.view==='recurring')renderRecurring();else renderDashboard();
}

function togglePauseRecurring(id){
  const rec=S.recurs.find(r=>r.id===id);if(!rec)return;
  rec.status=rec.status==='paused'?'active':'paused';
  save();renderRecurring();
}

function deleteRecurring(id){
  if(!confirm('Delete this recurring transaction? Your logged expenses will remain.'))return;
  S.recurs=S.recurs.filter(r=>r.id!==id);save();renderRecurring();
}

function renderRecurring(){
  const active=S.recurs.filter(r=>r.status!=='paused');
  const paused=S.recurs.filter(r=>r.status==='paused');
  const overdue=active.filter(r=>recurStatus(r)==='overdue');
  const dueToday=active.filter(r=>recurStatus(r)==='due_today');
  const dueSoon=active.filter(r=>recurStatus(r)==='due_soon');
  const logged=active.filter(r=>recurStatus(r)==='logged');
  const upcoming=active.filter(r=>recurStatus(r)==='upcoming');
  const actionNeeded=[...overdue,...dueToday,...dueSoon];
  const monthlyTotal=active.reduce((s,r)=>s+recurMonthlyAmt(r),0);
  const pendingAmt=actionNeeded.reduce((s,r)=>s+Number(r.amt),0);

  // Status config
  const stConf={
    overdue:{col:'var(--red)',bg:'#F43F5E18',border:'#F43F5E44',badge:'OVERDUE',icon:'🔴'},

    due_soon:{col:'var(--amber)',bg:'#F59E0B0D',border:'#F59E0B33',badge:'DUE SOON',icon:'⚡'},
    upcoming:{col:'var(--muted)',bg:'transparent',border:'var(--border)',badge:'UPCOMING',icon:'🕐'},
    logged:{col:'var(--green)',bg:'#10D9A80D',border:'#10D9A833',badge:'LOGGED ✓',icon:'✅'},
    paused:{col:'var(--subtle)',bg:'transparent',border:'var(--border)',badge:'PAUSED',icon:'⏸️'},
  };

  function recurCard(rec){
    const st=recurStatus(rec),sc=stConf[st]||stConf.upcoming;
    const cat=getCat(rec.cat),days=recurDaysUntilDue(rec);
    const nextDate=recurNextDueDate(rec).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    const card=rec.cardId?getCard(rec.cardId):null;
    const needsAction=['overdue','due_today','due_soon'].includes(st);
    return`<div style="background:var(--surf);border:1px solid ${sc.border};border-left:3px solid ${sc.col};border-radius:12px;padding:16px 18px">

        <div style="display:flex;align-items:center;gap:10px">

            <div style="font-size:14px;font-weight:600">${rec.name}</div>

        <div style="text-align:right;flex-shrink:0">

        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:12px">
        <span>Next: <strong style="color:${st==='overdue'?'var(--red)':st==='due_today'?'var(--amber)':'var(--text)'}">${st==='overdue'?Math.abs(days)+'d overdue':st==='due_today'?'Today':nextDate}</strong></span>
        <span>·</span>
        <span>${rec.freq==='monthly'?`₹${(rec.amt/1000).toFixed(rec.amt>=10000?1:0)}k/mo`:`${fmt(rec.amt)} per ${rec.freq}`}</span>
        ${card?`<span>· 💳 ${card.name}</span>`:''}
        ${rec.lastLoggedDate?`<span>· Last logged: ${rec.lastLoggedDate}</span>`:''}
        ${rec.notes?`<span>· ${rec.notes}</span>`:''}
      </div>
      <div style="display:flex;gap:7px">
        ${needsAction&&st!=='paused'?`<button class="btn-g" onclick="logRecurring('${rec.id}')" style="flex:1;justify-content:center">Log Now — ${fmt(rec.amt)}</button>`:''}
        ${st==='logged'?`<div style="flex:1;text-align:center;padding:9px;font-size:13px;color:var(--green);font-weight:600">✓ Logged this period</div>`:''}
        ${st==='upcoming'?`<button class="btn-s" onclick="logRecurring('${rec.id}')" style="flex:1;justify-content:center">Log Early</button>`:''}
        <button class="btn-s" onclick="togglePauseRecurring('${rec.id}')" style="padding:9px 12px" title="${rec.status==='paused'?'Resume':'Pause'}">${rec.status==='paused'?'▶ Resume':'⏸ Pause'}</button>
        <button class="btn-del" onclick="deleteRecurring('${rec.id}')">${ICONS.trash}</button>
      </div>
    </div>`;
  }

  el('main').innerHTML=`
  <div class="phd">
    <div><h1>Recurring Transactions</h1><p>Bills, subscriptions, and regular expenses — log with one click</p></div>
    <div style="display:flex;gap:8px">
      ${actionNeeded.length>1?`<button class="btn-g" onclick="logAllDue()">Log All Due (${actionNeeded.length})</button>`:''}
      <button class="btn" onclick="openAddRecurring()">${ICONS.plus} Add Recurring</button>
    </div>
  </div>

  <!-- Summary cards -->
  <div class="grid4" style="margin-bottom:14px">
    <div class="stat-card">
      <div class="stat-lbl">Monthly Obligations</div>
      <div class="stat-val c-r">${fmt(monthlyTotal)}</div>
      <div class="stat-sub">${active.length} active · committed outflow</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Action Required</div>
      <div class="stat-val" style="color:${actionNeeded.length?'var(--red)':'var(--green)'}">${actionNeeded.length||'None'}</div>
      <div class="stat-sub">${actionNeeded.length?`${fmt(pendingAmt)} to log now`:'All caught up ✓'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Logged This Month</div>
      <div class="stat-val c-g">${logged.length}</div>
      <div class="stat-sub">${fmt(logged.reduce((s,r)=>s+Number(r.amt),0))} recorded</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">Upcoming This Month</div>
      <div class="stat-val c-m">${upcoming.length}</div>
      <div class="stat-sub">${fmt(upcoming.reduce((s,r)=>s+Number(r.amt),0))} incoming</div>
    </div>
  </div>

  <!-- Action Required section -->
  ${actionNeeded.length?`
  <div style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
    <div class="sec" style="margin-bottom:0;color:var(--red)">⚠️ Action Required (${actionNeeded.length})</div>
    ${actionNeeded.length>1?`<button class="btn-g" onclick="logAllDue()" style="padding:6px 14px;font-size:12px">Log All Now</button>`:''}
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;margin-bottom:16px">
    ${actionNeeded.map(r=>recurCard(r)).join('')}
  </div>`:''}

  <!-- Logged this period -->
  ${logged.length?`
  <div class="sec" style="margin-bottom:10px">✅ Logged This Period (${logged.length})</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;margin-bottom:16px">
    ${logged.map(r=>recurCard(r)).join('')}
  </div>`:''}

  <!-- Upcoming -->
  ${upcoming.length?`
  <div class="sec" style="margin-bottom:10px">🕐 Upcoming (${upcoming.length})</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;margin-bottom:16px">
    ${upcoming.map(r=>recurCard(r)).join('')}
  </div>`:''}

  <!-- Paused -->
  ${paused.length?`
  <div class="sec" style="margin-bottom:10px">⏸️ Paused (${paused.length})</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;margin-bottom:16px">
    ${paused.map(r=>recurCard(r)).join('')}
  </div>`:''}

  <!-- Empty state -->
  ${!S.recurs.length?`
  <div class="card">
    <div class="empty"><div class="ei">🔄</div>
    <p>No recurring transactions yet.<br>
    <span style="font-size:12px;color:var(--subtle)">Add rent, EMIs, subscriptions, SIPs — anything that repeats.</span><br><br>
    <button class="btn" onclick="openAddRecurring()">${ICONS.plus} Add First Recurring</button></p>
    </div>
  </div>`:''}

  <!-- Monthly summary footer -->
  ${S.recurs.length?`
  <div class="card" style="margin-top:14px">
    <div class="sec">📊 Monthly Commitments Summary</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${active.sort((a,b)=>Number(b.amt)-Number(a.amt)).map(r=>{const cat=getCat(r.cat);return`
      <div style="display:flex;align-items:center;gap:10px;font-size:12px">
        <span style="font-size:14px">${cat.emoji}</span>
        <span style="flex:1;color:#B0B0C8">${r.name}</span>
        <span class="badge" style="background:${stConf[recurStatus(r)]?.col||'var(--muted)'}22;color:${stConf[recurStatus(r)]?.col||'var(--muted)'};font-size:10px">${stConf[recurStatus(r)]?.badge||''}</span>
        <span class="mono" style="font-weight:600;white-space:nowrap">${fmt(recurMonthlyAmt(r))}/mo</span>
      </div>`;}).join('')}

      </div>
    </div>

}

let _recurPayMode='cash';
function setRecurPayMode(m){
  _recurPayMode=m;
  el('r-pm-cash').classList.toggle('active',m==='cash');
  el('r-pm-card').classList.toggle('active',m==='card');
  el('r-card-wrap').style.display=m==='card'?'block':'none';
}
function selectRecurFreq(btn,freq){
  document.querySelectorAll('#r-freq-grid .pay-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  el('r-freq').value=freq;
  el('r-monthly-opts').style.display=freq==='monthly'?'block':'none';
  el('r-weekly-opts').style.display=freq==='weekly'?'block':'none';
  el('r-date-opts').style.display=['annual','quarterly'].includes(freq)?'block':'none';
  const labels={daily:'day',weekly:'week',monthly:'month',quarterly:'quarter',annual:'year'};
  const pf=el('r-preview-freq');if(pf)pf.textContent=labels[freq]||freq;
}
function submitRecurring(){
  const cat=el('r-cat').value,name=(el('r-name').value||'').trim(),amt=Number(el('r-amt').value)||0;
  if(!name){alert('Please enter a name.');return;}

  openModal(`

}
function onIncTypeChange(typeId){

  const nm=el('m-iname');if(nm&&(!nm.value||Object.values(names).includes(nm.value)))nm.value=names[typeId]||'';
}
function toggleRecurDay(){
  const wrap=el('recur-day-wrap');

}
function submitIncome(){

function renderCards(){
  const totalOut=S.cards.reduce((s,c)=>s+cardOutstanding(c),0);
  const totalLim=S.cards.reduce((s,c)=>s+Number(c.limit||0),0);
  const totalUtil=totalLim>0?totalOut/totalLim*100:0;
  const overdue=S.cards.filter(c=>cardStatus(c)==='overdue').length;
  const urgent=S.cards.filter(c=>cardStatus(c)==='urgent').length;

  const cardExpenses=S.expenses.filter(e=>e.cardId);
  const filterCard=S._cardFilter||'all';

  el('main').innerHTML=`
  <div class="phd">
    <div><h1>Credit Cards</h1><p>Billing, payments, interest & limit tracking</p></div>
    <button class="btn" onclick="openAddCard()">${ICONS.plus} Add Card</button>
  </div>

  ${overdue?`<div class="alert ae" style="margin-bottom:14px">${ICONS.warn} <span>${overdue} card${overdue>1?'s are':' is'} <strong>overdue</strong>. Interest is accruing daily. Make payments now.</span></div>`:''}
  ${urgent&&!overdue?`<div class="alert aw" style="margin-bottom:14px">${ICONS.warn} <span>${urgent} card payment due <strong>within 5 days</strong>. Don't miss the deadline.</span></div>`:''}

  <div class="grid4" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-lbl">Total Outstanding</div><div class="stat-val ${totalOut>0?'c-r':'c-g'}">${fmt(totalOut)}</div><div class="stat-sub">Across all cards</div></div>
    <div class="stat-card"><div class="stat-lbl">Total Credit Limit</div><div class="stat-val c-m">${fmt(totalLim)}</div><div class="stat-sub">${S.cards.length} card${S.cards.length!==1?'s':''}</div></div>
    <div class="stat-card"><div class="stat-lbl">Credit Utilization</div><div class="stat-val" style="color:${totalUtil>=80?'var(--red)':totalUtil>=50?'var(--amber)':'var(--green)'}">${totalUtil.toFixed(0)}%</div><div class="stat-sub">${totalUtil>=80?'High — affects score':totalUtil>=50?'Moderate':'Healthy'}</div></div>
    <div class="stat-card"><div class="stat-lbl">Bills Status</div><div class="stat-val ${overdue?'c-r':urgent?'c-a':'c-g'}">${overdue?overdue+' Overdue':urgent?urgent+' Urgent':S.cards.length?'All Clear ✓':'No cards'}</div><div class="stat-sub">${S.cards.length-overdue-urgent} cards on time</div></div>
  </div>

  ${S.cards.length?`
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin-bottom:16px">
    ${S.cards.map(renderCardTile).join('')}
  </div>`:`
  <div class="card" style="margin-bottom:16px">
    <div class="empty"><div class="ei">💳</div><p>No credit cards added yet.<br><br><button class="btn" onclick="openAddCard()">${ICONS.plus} Add Your First Card</button></p></div>
  </div>`}

  <!-- Card Transactions -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="sec" style="margin-bottom:0">Card Transactions</div>
      <select style="width:auto" onchange="S._cardFilter=this.value;renderCards()">
        <option value="all">All Cards</option>
        ${S.cards.map(c=>`<option value="${c.id}" ${filterCard===c.id?'selected':''}>${c.name}</option>`).join('')}
      </select>
    </div>
    ${(()=>{
      const txns=(filterCard==='all'?cardExpenses:cardExpenses.filter(e=>e.cardId===filterCard)).slice(0,30);
      if(!txns.length)return`<div class="empty" style="padding:30px 0"><div class="ei">💳</div><p>No card transactions yet</p></div>`;
      return`<div>${txns.map((e,i)=>{const cat=getCat(e.cat),card=getCard(e.cardId)||{name:'Unknown',color:'#6B7280'};return`<div style="display:flex;align-items:center;gap:12px;padding:11px 0;${i<txns.length-1?'border-bottom:1px solid var(--border)':''}"><div style="width:36px;height:36px;background:${cat.color}22;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${cat.emoji}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.desc||cat.label}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:7px;align-items:center"><span>${e.date}</span><span class="badge" style="background:${card.color}22;color:${card.color}">💳 ${card.name}</span></div></div><span class="mono c-r" style="font-weight:700;font-size:13px">-${fmt(e.amt)}</span></div>`;}).join('')}</div>`;
    })()}
  </div>`;
}

function renderCardTile(card){
  const out=cardOutstanding(card);
  const util=cardUtilPct(card);
  const days=cardDaysUntilDue(card);
  const st=cardStatus(card);
  const interest=cardInterestDue(card);
  const minDue=cardMinDue(card);
  const cycleChg=cardCurrentCycleCharges(card);
  const cyclePayment=cardPaymentThisCycle(card);
  const barCol=util>=90?'var(--red)':util>=70?'var(--amber)':card.color;

  const stConf={
    clear:{txt:'ALL CLEAR ✓',col:'var(--green)',icon:'✅'},
    ok:{txt:`DUE ${ordinal(card.dueDay)} (${days}d)`,col:'var(--muted)',icon:'🕐'},
    soon:{txt:`DUE IN ${days} DAYS ⚡`,col:'var(--amber)',icon:'⚠️'},
    urgent:{txt:`URGENT — ${days}D LEFT`,col:'var(--red)',icon:'🔴'},
    overdue:{txt:`${Math.abs(days)}D OVERDUE`,col:'var(--red)',icon:'🚨'},
  }[st];

  const paidStatus=out<=0;
  const nextDue=cardNextDueDate(card);
  const nextDueStr=nextDue.toLocaleDateString('en-IN',{day:'numeric',month:'short'});

  return`<div class="cc-tile" style="border-top-color:${card.color}">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div style="font-size:16px;font-weight:700">${card.name}</div>
        <div style="font-size:12px;color:var(--muted)">${card.bank||'Credit Card'} · ${Number(card.interestRate)||3.5}%/mo interest</div>
      </div>
      <span class="badge" style="background:${stConf.col}22;color:${stConf.col};font-size:10px;white-space:nowrap">${stConf.icon} ${stConf.txt}</span>
    </div>

    <!-- Utilization -->
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span class="c-m">Credit Utilization</span>
        <span class="mono" style="font-weight:700;color:${barCol}">${util.toFixed(0)}%${util>=80?' — High!':''}</span>
      </div>
      <div class="cc-util-bar"><div class="cc-util-fill" style="width:${util}%;background:${barCol}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-top:4px">
        <span class="mono" style="font-weight:700;color:${out>0?'var(--red)':'var(--text)'}">${fmt(out)} used</span>
        <span class="c-m">of ${fmt(card.limit)} limit</span>
      </div>
    </div>

    <!-- Info grid -->
    <div class="cc-info-grid">
      <div class="cc-info-cell">
        <div class="cc-info-lbl">Statement Date</div>
        <div class="cc-info-val">${ordinal(card.billingDay)} of month</div>
      </div>
      <div class="cc-info-cell">
        <div class="cc-info-lbl">Payment Due</div>
        <div class="cc-info-val" style="color:${days<0?'var(--red)':days<=5?'var(--amber)':'var(--text)'}">${nextDueStr}</div>
      </div>
      <div class="cc-info-cell">
        <div class="cc-info-lbl">Minimum Due</div>
        <div class="cc-info-val mono">${out>0?fmt(minDue):'₹0'}</div>
      </div>
      <div class="cc-info-cell">
        <div class="cc-info-lbl">This Cycle Spent</div>
        <div class="cc-info-val mono c-a">${fmt(cycleChg)}</div>
      </div>
    </div>

    ${interest>0?`<div class="alert ae" style="margin-top:0;margin-bottom:10px">${ICONS.warn} Interest accruing: <strong>${fmt(interest)}</strong> for ${Math.abs(days)} overdue days</div>`:''}
    ${util>=80&&util<100?`<div class="alert aw" style="margin-top:0;margin-bottom:10px">${ICONS.warn} ${util>=90?'Almost at limit!':'High utilization.'} Keep below 30% for good credit score.</div>`:''}
    ${util>=100?`<div class="alert ae" style="margin-top:0;margin-bottom:10px">${ICONS.warn} <strong>Credit limit exceeded!</strong> New transactions may be declined.</div>`:''}

    <!-- Payment status banner -->
    <div class="cc-status" style="border-color:${paidStatus?'#10D9A844':'#F43F5E44'};background:${paidStatus?'#10D9A818':'#F43F5E18'}">
      <span style="font-size:18px">${paidStatus?'✅':'❌'}</span>
      <div>
        <div style="font-size:12px;font-weight:700;color:${paidStatus?'var(--green)':'var(--red)'}">${paidStatus?'No outstanding balance':'Payment Pending'}</div>
        <div style="font-size:11px;color:var(--muted)">
          ${paidStatus?'All bills paid for this cycle.':
            days<0?`<strong>${fmt(out)}</strong> overdue since ${Math.abs(days)} days`:
            `<strong>${fmt(out)}</strong> due by ${nextDueStr}`}
          ${cyclePayment>0&&!paidStatus?` · Paid ${fmt(cyclePayment)} this cycle`:''}
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:8px;margin-top:10px">
      ${out>0?`<button class="btn-g" onclick="openPayBill('${card.id}')" style="flex:1">💳 Pay ${fmt(out)}</button>`:
        `<button class="btn-s" onclick="openPayBill('${card.id}')" style="flex:1">💳 Record Payment</button>`}
      <button class="btn-s" onclick="openCardHistory('${card.id}')" title="History">${ICONS.hist}</button>
      <button class="btn-del" onclick="deleteCard('${card.id}')" title="Delete">${ICONS.trash}</button>
    </div>
  </div>`;
}

function selCardColor(sw,col){document.querySelectorAll('#ccsw .sw').forEach(s=>s.classList.remove('sel'));sw.classList.add('sel');el('m-ccol').value=col;}
function submitCard(){
  const name=(el('m-cn').value||'').trim(),bank=(el('m-cb').value||'').trim();
  const limit=Number(el('m-cl').value)||0,bal=Number(el('m-cbal').value)||0;
  const bd=Number(el('m-cbd').value)||5,dd=Number(el('m-cdd').value)||25;
  const rate=Number(el('m-crate').value)||3.5,mdp=Number(el('m-cmdp').value)||5;
  const color=el('m-ccol').value||CARD_COLORS[0];
  if(!name){alert('Please enter a card name.');return;}
  if(!limit){alert('Please enter the credit limit.');return;}
  S.cards.push({id:uid(),name,bank,limit,initialBalance:bal,billingDay:bd,dueDay:dd,interestRate:rate,minDuePct:mdp,color,payments:[]});
  save();closeModal();navigate('cards');
}

function openPayBill(cardId){
  const card=getCard(cardId);if(!card)return;
  const out=cardOutstanding(card),minDue=cardMinDue(card),interest=cardInterestDue(card);
  openModal(`
  <div class="mhd"><h2>Pay Bill — ${card.name}</h2><button class="btn-del" onclick="closeModal()">${ICONS.x}</button></div>
  <div class="fcol">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px;background:var(--bg);border-radius:10px">
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Total Outstanding</div><div class="mono c-r" style="font-size:16px;font-weight:700">${fmt(out)}</div></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Minimum Due</div><div class="mono c-a" style="font-size:16px;font-weight:700">${fmt(minDue)}</div></div>
      ${interest>0?`<div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Interest Accrued</div><div class="mono c-r" style="font-size:14px;font-weight:700">${fmt(interest)}</div></div>`:''}
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:3px">Next Due Date</div><div style="font-size:14px;font-weight:600">${cardNextDueDate(card).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div></div>
    </div>
    ${interest>0?`<div class="alert ae" style="margin-bottom:0">${ICONS.warn} Paying only the minimum due keeps interest accruing at ${card.interestRate}%/month on the remaining balance.</div>`:''}
    <div>
      <label class="lbl">Quick Select Amount</label>
      <div class="pay-quick">
        <div class="pay-opt ${out>0?'sel':''}" onclick="setPayAmt(this,${out})"><div class="pay-opt-lbl">Full Amount</div><div class="pay-opt-val">${fmt(out)}</div></div>
        <div class="pay-opt" onclick="setPayAmt(this,${minDue})"><div class="pay-opt-lbl">Minimum Due</div><div class="pay-opt-val">${fmt(minDue)}</div></div>
        <div class="pay-opt" onclick="setPayAmt(this,0)"><div class="pay-opt-lbl">Custom</div><div class="pay-opt-val">Enter below</div></div>
      </div>
    </div>
    <div><label class="lbl">Payment Amount (₹)</label><input type="number" id="m-pamt" value="${out}" min="1" oninput="document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'))"></div>
    <div><label class="lbl">Payment Date</label><input type="date" id="m-pdate" value="${today()}"></div>
    <div><label class="lbl">Note (optional)</label><input id="m-pnote" placeholder="UPI, NEFT, Auto-debit, Cheque..."></div>
    ${out<=0?`<div class="alert ag" style="margin-bottom:0">${ICONS.check} No outstanding balance. Recording an advance payment.</div>`:''}
    <button class="btn-g" style="justify-content:center" onclick="submitPayment('${cardId}')">Record Payment</button>
  </div>`);
}
function setPayAmt(el,amt){
  document.querySelectorAll('.pay-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  if(amt>0)document.getElementById('m-pamt').value=amt;
  else document.getElementById('m-pamt').focus();
}
function submitPayment(cardId){
  const amt=Number(el('m-pamt').value);
  const date=el('m-pdate').value,note=el('m-pnote').value;
  if(!amt||amt<=0){alert('Enter a valid payment amount.');return;}
  const card=getCard(cardId);if(!card)return;
  card.payments=card.payments||[];
  card.payments.push({id:uid(),date,amount:amt,note});
  save();closeModal();navigate('cards');
}

function openCardHistory(cardId){
  const card=getCard(cardId);if(!card)return;
  const out=cardOutstanding(card),util=cardUtilPct(card);
  const cardExp=S.expenses.filter(e=>e.cardId===cardId).sort((a,b)=>b.date.localeCompare(a.date));
  const payments=(card.payments||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const totalCharged=cardTotalCharged(card),totalPaid=cardTotalPaid(card);
  el('modal').classList.add('wide');
  openModal(`
  <div class="mhd"><h2>💳 ${card.name}</h2><button class="btn-del" onclick="closeModal();el('modal').classList.remove('wide')">${ICONS.x}</button></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
    ${[['Total Charged',fmt(totalCharged),'c-r'],['Total Paid',fmt(totalPaid),'c-g'],['Outstanding',fmt(out),out>0?'c-r':'c-g'],['Utilization',util.toFixed(0)+'%',util>=80?'c-r':util>=50?'c-a':'c-g']].map(([l,v,c])=>`<div style="background:var(--bg);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);margin-bottom:3px">${l}</div><div class="mono ${c}" style="font-size:14px;font-weight:700">${v}</div></div>`).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div>
      <div class="sec">Payments</div>
      ${payments.length?payments.map(p=>`<div class="hist-entry"><div class="hist-dot" style="background:var(--green)"></div><div style="flex:1"><div style="font-size:13px;font-weight:500">${fmt(p.amount)}</div><div style="font-size:11px;color:var(--muted)">${p.date}${p.note?' · '+p.note:''}</div></div></div>`).join(''):`<div style="color:var(--subtle);font-size:13px;padding:12px 0">No payments recorded</div>`}
    </div>
    <div>

// PORTFOLIO SCENARIO MATH
// ═══════════════════════════════════════
// Conservative = 55% of assumed rate (bad decade), Optimistic = 140% (bull run)
function scenarioRate(rate,scenario){
  if(scenario==='conservative')return Math.max(3,rate*0.55);
  if(scenario==='optimistic')return Math.min(32,rate*1.40);
  return rate;
}
function invProjectedScenario(inv,addYrs,scenario){
  const rate=scenarioRate(Number(inv.rate)||0,scenario);
  const amt=Number(inv.amt)||0,mo=moElapsed(inv.date);
  return inv.mode==='sip'?calcSIP(amt,rate,mo+addYrs*12):calcLump(amt,rate,mo/12+addYrs);
}
// Convert a future nominal amount into today's purchasing power
function toRealMoney(nominalAmt,years,inflPct){
  return nominalAmt/Math.pow(1+inflPct/100,years);
}
// Rough years-to-FI via monthly iteration (real return basis)
function yearsToFI(currentPortfolio,monthlyContrib,annualRatePct,target){
  if(currentPortfolio>=target)return 0;
  if(annualRatePct<=0&&monthlyContrib<=0)return null;
  const r=annualRatePct/100/12;
  let mo=0,val=currentPortfolio;
  while(val<target&&mo<12*80){val=r>0?val*(1+r)+monthlyContrib:val+monthlyContrib;mo++;}
  return mo<12*80?Math.ceil(mo/12):null;
}

function renderPortfolio(){
  const INFL=S.inflationRate||6;                   // India default: 6% annual inflation
  const totalInv=S.invs.reduce((s,i)=>s+invTotalInvested(i),0);
  const totalCur=S.invs.reduce((s,i)=>s+invCurrentValue(i),0);
  const wRate=totalInv>0?S.invs.reduce((s,i)=>s+(Number(i.rate)||0)*(invTotalInvested(i)/totalInv),0):0;
  const realRate=Math.max(0.5,wRate-INFL);         // real return = nominal − inflation

  // Average monthly expenses (last 3 months)
  const avgExp=(()=>{const now=new Date();let t=0,n=0;for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1),k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const mo=S.expenses.filter(e=>mKey(e.date)===k);if(mo.length){t+=mo.reduce((s,e)=>s+Number(e.amt),0);n++;}}return n?t/n:Number(S.profile.salary)*0.6;})();

  // Emergency fund
  const efInvs=S.invs.filter(i=>i.isEmergency),efCur=efInvs.reduce((s,i)=>s+invCurrentValue(i),0);
  const efTarget=avgExp*6,efPct=efTarget>0?Math.min(100,efCur/efTarget*100):0;

  // FI — corpus in TODAY's rupees (4% SWR = 25× annual spending)
  const fiTarget=avgExp*12*25,fiPct=fiTarget>0?Math.min(100,totalCur/fiTarget*100):0;
  const monthlyInvOut=thisMonthInvOutflow();
  const fiYrsNominal=yearsToFI(totalCur,monthlyInvOut,wRate,fiTarget);
  const fiYrsReal=yearsToFI(totalCur,monthlyInvOut,realRate,fiTarget);

  // Scenario portfolio totals at 10 years
  const sc10=(s)=>S.invs.reduce((t,i)=>t+invProjectedScenario(i,10,s),0);
  const conserv10=sc10('conservative'),expect10=sc10('expected'),optim10=sc10('optimistic');
  const real10=toRealMoney(expect10,10,INFL);

  // Chart data: 0–10 years, 3 scenarios
  const gYrs=Array.from({length:11},(_,i)=>i);
  const gC=gYrs.map(yr=>S.invs.reduce((s,i)=>s+invProjectedScenario(i,yr,'conservative'),0));
  const gE=gYrs.map(yr=>S.invs.reduce((s,i)=>s+invProjectedAt(i,yr),0));
  const gO=gYrs.map(yr=>S.invs.reduce((s,i)=>s+invProjectedScenario(i,yr,'optimistic'),0));

  el('main').innerHTML=`
  <div class="phd">
    <div><h1>Portfolio & Returns</h1><p>Scenario analysis, real returns &amp; inflation-adjusted projections</p></div>
    <div style="display:flex;gap:8px;align-items:center">
      <label style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer">
        Inflation rate:
        <input type="number" value="${INFL}" min="1" max="20" step="0.5" style="width:52px;padding:4px 7px;font-size:12px;font-family:'JetBrains Mono'" onchange="S.inflationRate=Number(this.value)||6;renderPortfolio()">
        <span style="color:var(--muted)">% / yr</span>
      </label>
      <button class="btn-s" onclick="openAddInvestment()">${ICONS.plus} Add Investment</button>
    </div>
  </div>

  <!-- DISCLAIMER — must appear before any numbers -->

        </div>
      </div>
    </div>
  </div>`;
}
function updateBudget(id,val){
  const v=Math.max(0,Math.min(100,parseFloat(val)||0));S.budget[id]=v;
  const pi=el('pct-'+id);if(pi)pi.value=v;
  const ri=document.querySelector(`#catrow-${id} input[type=range]`);if(ri){ri.value=v;const cat=getCat(id);ri.style.background=`linear-gradient(to right,${cat.color} ${v/60*100}%,var(--border) ${v/60*100}%)`;}
  const total=S.cats.reduce((s,c)=>s+(Number(S.budget[c.id])||0),0),isV=Math.round(total)===100;
  const tm=document.querySelector('.phd .mono');if(tm){tm.textContent=`${total.toFixed(1)}%/100%`;tm.style.color=isV?'var(--green)':'var(--red)';}
  const sb=el('save-btn');if(sb)sb.textContent=isV?'Save Changes':'Fix First';
}
function adjustBudget(id,d){const c=Number(S.budget[id])||0;updateBudget(id,Math.max(0,Math.min(100,c+d)));}
function autoBalance(){const t=S.cats.reduce((s,c)=>s+(Number(S.budget[c.id])||0),0),diff=100-t;if(Math.abs(diff)<0.01)return;const sh=diff/S.cats.length;S.cats.forEach(c=>{S.budget[c.id]=Math.max(0,Math.round(((Number(S.budget[c.id])||0)+sh)*10)/10);});renderBudget();}
function deleteCat(id){if(!confirm(`Remove "${getCat(id).label}"? Expenses remain.`))return;S.cats=S.cats.filter(c=>c.id!==id);delete S.budget[id];save();renderBudget();}
function saveBudgetAndProfile(){
  const name=el('f-pname').value.trim(),salary=Number(el('f-psal').value)||0;
  const t=S.cats.reduce((s,c)=>s+(Number(S.budget[c.id])||0),0);
  if(Math.round(t)!==100){alert('Allocations must total 100%. Currently: '+t.toFixed(1)+'%');return;}
  S.profile={name,salary};save();
  const btn=el('save-btn');if(btn){btn.textContent='✓ Saved!';btn.style.background='var(--green)';setTimeout(()=>{btn.textContent='Save Changes';btn.style.background='';},2000);}
  renderSidebar();
}
